services:
  db:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: anesti
      MYSQL_USER: anesti
      MYSQL_PASSWORD: anesti
      MYSQL_ROOT_PASSWORD: anesti-root
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u anesti --password=anesti"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    environment:
      ANESTI_DB_HOST: db
      ANESTI_DB_PORT: 3306
      ANESTI_DB_NAME: anesti
      ANESTI_DB_USER: anesti
      ANESTI_DB_PASSWORD: anesti
      ANESTI_APP_URL: http://localhost:8080
      ANESTI_ENV: development
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
    depends_on:
      db:
        condition: service_healthy

volumes:
  mysql-data:
