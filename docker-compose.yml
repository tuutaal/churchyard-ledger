services:
  db:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: churchyard_ledger
      MYSQL_USER: churchyard
      MYSQL_PASSWORD: churchyard
      MYSQL_ROOT_PASSWORD: churchyard-root
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u churchyard --password=churchyard"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    environment:
      DATABASE_URL: mysql://churchyard:churchyard@db:3306/churchyard_ledger
      NEXT_PUBLIC_APP_URL: http://localhost:3000
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - node-modules:/app/node_modules
    depends_on:
      db:
        condition: service_healthy

volumes:
  mysql-data:
  node-modules:
